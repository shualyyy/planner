<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Planer · Monochrome</title>
<style>
  /* ──────────────────────────────────────────────────────────────
     Tokens
     ────────────────────────────────────────────────────────────── */
  :root {
    --bg:           #FAFAFA;
    --surface:      #FFFFFF;
    --border:       #EBEBEB;
    --text:         #111111;
    --text-2:       #888888;
    --text-muted:   #BBBBBB;
    --chip-bg:      #F2F2F2;
    --toggle-off:   #DEDEDE;
    --danger:       #D93025;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* ──────────────────────────────────────────────────────────────
     Reset
     ────────────────────────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #EBEBEB;
    font-family: var(--font);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    align-items: stretch;
  }
  button {
    font-family: inherit;
    background: none;
    border: none;
    color: inherit;
    cursor: pointer;
    padding: 0;
  }
  input, textarea {
    font-family: inherit;
    color: inherit;
    border: none;
    background: none;
    outline: none;
  }
  ul, ol { list-style: none; }

  /* ──────────────────────────────────────────────────────────────
     Frame
     ────────────────────────────────────────────────────────────── */
  .frame {
    width: 100%;
    max-width: 390px;
    min-height: 100vh;
    min-height: 100dvh;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 390px) {
    body { background: var(--bg); }
  }

  /* ──────────────────────────────────────────────────────────────
     Screen system — all mounted, one visible
     ────────────────────────────────────────────────────────────── */
  .screen {
    flex: 1;
    display: none;
    flex-direction: column;
    min-height: 0;
    padding-bottom: 49px; /* clear the tab bar */
  }
  .screen.on { display: flex; }
  .screen.on .scroll { animation: mount 150ms ease-out; }
  @keyframes mount {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* ──────────────────────────────────────────────────────────────
     Header
     ────────────────────────────────────────────────────────────── */
  .header {
    height: 56px;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header .right {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }
  .header .nav-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header .nav-row button {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
  }

  /* ──────────────────────────────────────────────────────────────
     Section labels (UPPERCASE meta)
     ────────────────────────────────────────────────────────────── */
  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 24px 20px 8px;
  }

  /* ──────────────────────────────────────────────────────────────
     Task rows
     ────────────────────────────────────────────────────────────── */
  .task-list {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .task-wrap {
    position: relative;
    overflow: hidden;
    background: var(--surface);
  }
  .task-wrap + .task-wrap .task::before {
    content: "";
    position: absolute;
    left: 52px;
    right: 0;
    top: 0;
    height: 1px;
    background: var(--border);
  }
  .task {
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    height: 52px;
    padding: 0 20px;
    background: var(--surface);
    transform: translateX(0);
    transition: transform 150ms ease-out;
    cursor: pointer;
    user-select: none;
  }
  .task.swiped { transform: translateX(-104px); }

  .checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--text-muted);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--surface);
  }
  .checkbox.done {
    background: var(--text);
    border-color: var(--text);
  }
  .checkbox svg { display: none; }
  .checkbox.done svg { display: block; }

  .task .title {
    flex: 1;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .task.done .title {
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-thickness: 1px;
  }

  .time-chip {
    background: var(--chip-bg);
    color: var(--text-2);
    font-size: 12px;
    font-weight: 400;
    padding: 5px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* swipe action strip behind a row */
  .actions {
    position: absolute;
    top: 0; right: 0;
    height: 52px;
    width: 104px;
    display: flex;
  }
  .actions button {
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .actions .edit { background: var(--chip-bg); color: var(--text); }
  .actions .delete { background: var(--danger); color: #fff; }

  /* ──────────────────────────────────────────────────────────────
     Empty states
     ────────────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    color: var(--text-2);
    font-size: 15px;
    padding: 96px 32px 32px;
  }

  /* ──────────────────────────────────────────────────────────────
     Calendar
     ────────────────────────────────────────────────────────────── */
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 8px 20px 8px;
  }
  .cal-weekdays div {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 20px;
    row-gap: 8px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 8px;
    gap: 6px;
    position: relative;
    cursor: pointer;
  }
  .cal-day .num {
    font-size: 12px;
    font-weight: 400;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .cal-day.other .num { color: var(--text-muted); }
  .cal-day.today .num {
    background: var(--text);
    color: #fff;
  }
  .cal-day .dots {
    display: flex;
    gap: 2px;
    height: 3px;
  }
  .cal-day .dots span {
    width: 3px;
    height: 3px;
    background: var(--text-muted);
  }

  /* ──────────────────────────────────────────────────────────────
     Bottom sheet (day popup)
     ────────────────────────────────────────────────────────────── */
  .sheet-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.32);
    z-index: 50;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet-backdrop.on { display: flex; }
  .sheet {
    width: 100%;
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    max-height: 70%;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 150ms ease-out;
  }
  .sheet-backdrop.on .sheet { transform: translateY(0); }
  .sheet .sheet-header {
    padding: 20px 20px 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .sheet .sheet-header h2 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .sheet .sheet-header .close {
    font-size: 13px;
    color: var(--text-2);
  }
  .sheet .sheet-meta {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 20px 12px;
  }

  /* ──────────────────────────────────────────────────────────────
     Assistant
     ────────────────────────────────────────────────────────────── */
  .asst {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .asst-stream {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .asst-stream::-webkit-scrollbar { width: 0; height: 0; }
  .bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.4;
  }
  .bubble.user { align-self: flex-end; background: var(--text); color: #fff; }
  .bubble.ai   { align-self: flex-start; background: var(--chip-bg); color: var(--text); }
  .composer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 20px;
    display: flex;
    align-items: flex-end;
    gap: 12px;
  }
  .composer textarea {
    flex: 1;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    resize: none;
    min-height: 38px;
    max-height: 110px;
    line-height: 1.4;
  }
  .composer .send {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    padding: 10px 4px;
  }
  .composer .send:disabled { color: var(--text-muted); }

  /* ──────────────────────────────────────────────────────────────
     Wins
     ────────────────────────────────────────────────────────────── */
  .win-list {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .win-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .win-row:last-child { border-bottom: none; }
  .win-row .title { font-size: 15px; color: var(--text); }
  .win-row .date  { font-size: 12px; color: var(--text-2); font-variant-numeric: tabular-nums; }

  /* ──────────────────────────────────────────────────────────────
     Settings
     ────────────────────────────────────────────────────────────── */
  .set-card {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .set-row {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 20px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    width: 100%;
    text-align: left;
  }
  .set-card .set-row:last-child { border-bottom: none; }
  .set-row .label { flex: 1; font-size: 15px; color: var(--text); }
  .set-row .value { font-size: 13px; color: var(--text-2); }
  .set-row.danger .label { color: var(--danger); }

  .toggle {
    width: 44px;
    height: 24px;
    border-radius: 12px;
    background: var(--toggle-off);
    position: relative;
    transition: background 150ms ease-out;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--text); }
  .toggle::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    transition: left 150ms ease-out;
  }
  .toggle.on::after { left: 22px; }

  /* ──────────────────────────────────────────────────────────────
     Tab bar — flush, full-width, icons only
     ────────────────────────────────────────────────────────────── */
  .tabbar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 49px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 20;
  }
  .tab {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #CCCCCC;
    transition: color 150ms ease-out;
  }
  .tab.on { color: var(--text); }

  svg.icon { display: block; }
</style>
</head>

<body>

<div class="frame" id="frame">

  <!-- ─────────────────────────────────────────────────────────────
       TASKS SCREEN
       ───────────────────────────────────────────────────────────── -->
  <section class="screen on" id="screen-tasks">
    <header class="header">
      <h1>Tasks</h1>
      <button class="right" data-action="new">+ New</button>
    </header>
    <div class="scroll" id="tasks-scroll"></div>
  </section>

  <!-- ─────────────────────────────────────────────────────────────
       CALENDAR SCREEN
       ───────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-cal">
    <header class="header">
      <div class="nav-row">
        <button id="cal-prev" aria-label="Previous month">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <h1 id="cal-title">—</h1>
        <button id="cal-next" aria-label="Next month">
          <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      <button class="right" data-action="new">+ New</button>
    </header>
    <div class="scroll">
      <div class="cal-weekdays">
        <div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div><div>Su</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </section>

  <!-- ─────────────────────────────────────────────────────────────
       ASSISTANT SCREEN
       ───────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-asst">
    <header class="header">
      <h1>Assistant</h1>
    </header>
    <div class="asst">
      <div class="asst-stream" id="asst-stream"></div>
      <div class="composer">
        <textarea id="asst-input" rows="1" placeholder="Say what to add…"></textarea>
        <button class="send" id="asst-send" disabled>Send</button>
      </div>
    </div>
  </section>

  <!-- ─────────────────────────────────────────────────────────────
       WINS SCREEN
       ───────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-wins">
    <header class="header">
      <h1>Wins</h1>
    </header>
    <div class="scroll" id="wins-scroll"></div>
  </section>

  <!-- ─────────────────────────────────────────────────────────────
       SETTINGS SCREEN
       ───────────────────────────────────────────────────────────── -->
  <section class="screen" id="screen-set">
    <header class="header">
      <h1>Settings</h1>
    </header>
    <div class="scroll" id="set-scroll"></div>
  </section>

  <!-- ─────────────────────────────────────────────────────────────
       BOTTOM SHEET
       ───────────────────────────────────────────────────────────── -->
  <div class="sheet-backdrop" id="sheet-backdrop">
    <div class="sheet" id="sheet"></div>
  </div>

  <!-- ─────────────────────────────────────────────────────────────
       TAB BAR
       ───────────────────────────────────────────────────────────── -->
  <nav class="tabbar" id="tabbar">
    <button class="tab on" data-tab="tasks" aria-label="Tasks">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 6h2M4 12h2M4 18h2M10 6h10M10 12h10M10 18h10"/>
      </svg>
    </button>
    <button class="tab" data-tab="cal" aria-label="Calendar">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/>
      </svg>
    </button>
    <button class="tab" data-tab="asst" aria-label="Assistant">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 5h16a2 2 0 012 2v9a2 2 0 01-2 2h-8l-5 4v-4H4a2 2 0 01-2-2V7a2 2 0 012-2z"/>
      </svg>
    </button>
    <button class="tab" data-tab="wins" aria-label="Wins">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 21h8M12 17v4M17 3H7l2 7H9a4 4 0 004 4 4 4 0 004-4h-2l2-7z"/>
      </svg>
    </button>
    <button class="tab" data-tab="set" aria-label="Settings">
      <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
      </svg>
    </button>
  </nav>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
const today = new Date(); today.setHours(0,0,0,0);
const addD = (d, n) => { const r = new Date(d); r.setDate(r.getDate() + n); return r; };
const dk = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const state = {
  tab: 'tasks',
  calAnchor: new Date(today),
  tasks: [
    { id: 't1', title: 'Standup with the team',  date: dk(today),         time: '09:30', done: true  },
    { id: 't2', title: 'Design review · v2',     date: dk(today),         time: '14:00', done: false },
    { id: 't3', title: 'Pick up groceries',      date: dk(today),         time: null,    done: false },
    { id: 't4', title: '1:1 with Ana',           date: dk(addD(today,1)), time: '10:30', done: false },
    { id: 't5', title: 'Call mom',               date: dk(addD(today,1)), time: '19:00', done: false },
    { id: 't6', title: 'Code review',            date: dk(addD(today,-1)),time: '15:00', done: true  },
    { id: 't7', title: 'Run · 5K',               date: dk(addD(today,-1)),time: '07:00', done: true  },
  ],
  asstMessages: [
    { role: 'ai',   text: 'What would you like to add?' },
  ],
  settings: {
    notifications: true,
    dailyBrief: true,
    soundsHaptics: false,
  },
};

const SVG_CHECK = '<svg width="9" height="6" viewBox="0 0 9 6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3l3 3 4-5"/></svg>';
const SVG_EDIT  = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
const SVG_TRASH = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>';

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

/* ════════════════════════════════════════════════════════════════
   TAB SWITCHING
   ═══════════════════════════════════════════════════════════════ */
const screens = {
  tasks: document.getElementById('screen-tasks'),
  cal:   document.getElementById('screen-cal'),
  asst:  document.getElementById('screen-asst'),
  wins:  document.getElementById('screen-wins'),
  set:   document.getElementById('screen-set'),
};
const tabs = document.querySelectorAll('#tabbar .tab');

function setTab(id) {
  state.tab = id;
  for (const k in screens) screens[k].classList.toggle('on', k === id);
  tabs.forEach(t => t.classList.toggle('on', t.dataset.tab === id));
  closeSheet();
  // Reset swipes when leaving Tasks
  document.querySelectorAll('.task').forEach(el => el.classList.remove('swiped'));
}
tabs.forEach(t => t.addEventListener('click', () => setTab(t.dataset.tab)));

/* ════════════════════════════════════════════════════════════════
   TASKS RENDER
   ═══════════════════════════════════════════════════════════════ */
function formatDayLabel(date) {
  const tk = dk(today), tom = dk(addD(today, 1));
  if (date === tk) return 'Today';
  if (date === tom) return 'Tomorrow';
  const d = new Date(date + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderTasks() {
  const scroll = document.getElementById('tasks-scroll');
  const groups = {};
  state.tasks.forEach(t => { (groups[t.date] = groups[t.date] || []).push(t); });

  // Show only today + future dates in main view; past in their own section after
  const tk = dk(today);
  const futureDates = Object.keys(groups).filter(d => d >= tk).sort();
  const pastDates   = Object.keys(groups).filter(d => d <  tk).sort().reverse();

  let html = '';

  if (futureDates.length === 0 && pastDates.length === 0) {
    html = '<div class="empty">Nothing here.</div>';
    scroll.innerHTML = html;
    return;
  }

  for (const d of futureDates) {
    html += `<div class="section-label">${formatDayLabel(d)}</div>`;
    html += `<div class="task-list">`;
    for (const t of groups[d]) html += taskRowHtml(t);
    html += `</div>`;
  }
  if (pastDates.length > 0) {
    html += `<div class="section-label">Earlier</div>`;
    html += `<div class="task-list">`;
    for (const d of pastDates) for (const t of groups[d]) html += taskRowHtml(t);
    html += `</div>`;
  }

  scroll.innerHTML = html;
  wireTaskHandlers(scroll);
}

function taskRowHtml(t) {
  return `
    <div class="task-wrap" data-id="${t.id}">
      <div class="actions">
        <button class="edit" data-act="edit" aria-label="Edit">${SVG_EDIT}</button>
        <button class="delete" data-act="delete" aria-label="Delete">${SVG_TRASH}</button>
      </div>
      <div class="task ${t.done ? 'done' : ''}" data-id="${t.id}">
        <div class="checkbox ${t.done ? 'done' : ''}" data-act="toggle">${SVG_CHECK}</div>
        <div class="title">${escapeHtml(t.title)}</div>
        ${t.time ? `<div class="time-chip">${t.time}</div>` : ''}
      </div>
    </div>`;
}

/* swipe-left to reveal actions; tap checkbox to toggle; tap row to close any open swipe */
function wireTaskHandlers(root) {
  root.querySelectorAll('.task-wrap').forEach(wrap => {
    const row = wrap.querySelector('.task');
    const id = wrap.dataset.id;
    let startX = 0, dx = 0, swiping = false;

    function down(x) { startX = x; dx = 0; swiping = false; }
    function move(x) {
      dx = x - startX;
      if (Math.abs(dx) > 6) swiping = true;
      if (dx < 0) row.style.transform = `translateX(${Math.max(dx, -120)}px)`;
    }
    function up() {
      row.style.transform = '';
      if (dx < -50) row.classList.add('swiped');
      else if (dx > 30) row.classList.remove('swiped');
    }

    row.addEventListener('touchstart', e => down(e.touches[0].clientX), { passive: true });
    row.addEventListener('touchmove',  e => move(e.touches[0].clientX), { passive: true });
    row.addEventListener('touchend',   up);

    let mouseDown = false;
    row.addEventListener('mousedown', e => { mouseDown = true; down(e.clientX); });
    window.addEventListener('mousemove', e => { if (mouseDown) move(e.clientX); });
    window.addEventListener('mouseup',   () => { if (mouseDown) { mouseDown = false; up(); } });

    // Tap: toggle if hit on checkbox; otherwise toggle row if not swiping/swiped
    row.addEventListener('click', e => {
      if (swiping) { swiping = false; return; }
      if (row.classList.contains('swiped')) {
        row.classList.remove('swiped');
        return;
      }
      toggleTask(id);
    });

    wrap.querySelector('[data-act="delete"]').addEventListener('click', e => {
      e.stopPropagation();
      deleteTask(id);
    });
    wrap.querySelector('[data-act="edit"]').addEventListener('click', e => {
      e.stopPropagation();
      row.classList.remove('swiped');
      // (No edit modal in this prototype — would open AddTask sheet pre-filled)
    });
  });
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks();
}
function deleteTask(id) {
  state.tasks = state.tasks.filter(x => x.id !== id);
  renderTasks();
  renderCal();
}
function addTask(title, dateStr, time) {
  state.tasks.push({
    id: 'n' + Date.now(),
    title, date: dateStr || dk(today), time: time || null, done: false,
  });
  renderTasks();
  renderCal();
}

/* ════════════════════════════════════════════════════════════════
   CALENDAR RENDER
   ═══════════════════════════════════════════════════════════════ */
function renderCal() {
  const a = state.calAnchor;
  document.getElementById('cal-title').textContent = `${MONTHS[a.getMonth()]} ${a.getFullYear()}`;

  const year = a.getFullYear(), month = a.getMonth();
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Monday=0
  const gridStart = new Date(year, month, 1 - firstDow);
  // 6 weeks safety
  const days = Array.from({ length: 42 }, (_, i) =>
    new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i)
  );
  // Trim to 5 weeks if last row is all next-month (gives breathing room)
  const useDays = days.slice(0, days[35].getMonth() === month ? 42 : 35);

  const counts = {};
  for (const t of state.tasks) counts[t.date] = (counts[t.date] || 0) + 1;
  const tk = dk(today);

  const grid = document.getElementById('cal-grid');
  let html = '';
  for (const d of useDays) {
    const dkey = dk(d);
    const isToday = dkey === tk;
    const isOther = d.getMonth() !== month;
    const c = Math.min(counts[dkey] || 0, 3);
    let dotsHtml = '';
    for (let i = 0; i < c; i++) dotsHtml += '<span></span>';
    html += `
      <div class="cal-day ${isOther ? 'other' : ''} ${isToday ? 'today' : ''}" data-date="${dkey}">
        <div class="num">${d.getDate()}</div>
        <div class="dots">${dotsHtml}</div>
      </div>`;
  }
  grid.innerHTML = html;

  grid.querySelectorAll('.cal-day').forEach(el => {
    el.addEventListener('click', () => openDaySheet(el.dataset.date));
  });
}

document.getElementById('cal-prev').addEventListener('click', () => {
  state.calAnchor = new Date(state.calAnchor.getFullYear(), state.calAnchor.getMonth() - 1, 1);
  renderCal();
});
document.getElementById('cal-next').addEventListener('click', () => {
  state.calAnchor = new Date(state.calAnchor.getFullYear(), state.calAnchor.getMonth() + 1, 1);
  renderCal();
});

/* ════════════════════════════════════════════════════════════════
   DAY SHEET
   ═══════════════════════════════════════════════════════════════ */
const sheetBackdrop = document.getElementById('sheet-backdrop');
const sheet = document.getElementById('sheet');

function openDaySheet(dateStr) {
  const tasks = state.tasks.filter(t => t.date === dateStr);
  const d = new Date(dateStr + 'T00:00:00');
  const title = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  let body = '';
  if (tasks.length === 0) {
    body = '<div class="empty" style="padding: 32px;">Nothing on this day.</div>';
  } else {
    body = '<div class="task-list" style="border: none;">';
    for (const t of tasks) body += taskRowHtml(t);
    body += '</div>';
  }
  sheet.innerHTML = `
    <div class="sheet-header">
      <h2>${title}</h2>
      <button class="close" id="sheet-close">Close</button>
    </div>
    <div class="sheet-meta">${tasks.length} task${tasks.length === 1 ? '' : 's'}</div>
    ${body}
    <div style="height: 24px;"></div>
  `;
  sheetBackdrop.classList.add('on');
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  wireTaskHandlers(sheet);
}
function closeSheet() { sheetBackdrop.classList.remove('on'); }
sheetBackdrop.addEventListener('click', e => { if (e.target === sheetBackdrop) closeSheet(); });

/* ════════════════════════════════════════════════════════════════
   ASSISTANT
   ═══════════════════════════════════════════════════════════════ */
const asstStream = document.getElementById('asst-stream');
const asstInput  = document.getElementById('asst-input');
const asstSend   = document.getElementById('asst-send');

function renderAsst() {
  asstStream.innerHTML = state.asstMessages
    .map(m => `<div class="bubble ${m.role}">${escapeHtml(m.text)}</div>`)
    .join('');
  asstStream.scrollTop = asstStream.scrollHeight;
}

asstInput.addEventListener('input', () => {
  asstSend.disabled = !asstInput.value.trim();
  asstInput.style.height = 'auto';
  asstInput.style.height = Math.min(asstInput.scrollHeight, 110) + 'px';
});

function sendAsstMessage() {
  const text = asstInput.value.trim();
  if (!text) return;
  state.asstMessages.push({ role: 'user', text });
  asstInput.value = '';
  asstInput.style.height = '';
  asstSend.disabled = true;
  renderAsst();

  // Fake parse + reply
  setTimeout(() => {
    const timeMatch = text.match(/(\d{1,2}):?(\d{2})?\s*(am|pm)?/i);
    let time = null;
    if (timeMatch) {
      let h = parseInt(timeMatch[1]);
      const m = timeMatch[2] || '00';
      if (timeMatch[3]?.toLowerCase() === 'pm' && h < 12) h += 12;
      time = `${String(h).padStart(2,'0')}:${m}`;
    }
    let date = dk(today);
    if (/tomorrow|завтра/i.test(text)) date = dk(addD(today, 1));

    const title = text.length > 50 ? text.slice(0, 50) + '…' : text;
    addTask(title, date, time);
    state.asstMessages.push({
      role: 'ai',
      text: `Added "${title}"${time ? ' at ' + time : ''}${date === dk(today) ? ' today' : ' tomorrow'}.`,
    });
    renderAsst();
  }, 400);
}

asstSend.addEventListener('click', sendAsstMessage);
asstInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAsstMessage(); }
});

/* ════════════════════════════════════════════════════════════════
   WINS RENDER
   ═══════════════════════════════════════════════════════════════ */
function renderWins() {
  const scroll = document.getElementById('wins-scroll');
  const wins = state.tasks
    .filter(t => t.done)
    .sort((a, b) => (b.date + (b.time || '')).localeCompare(a.date + (a.time || '')));

  if (wins.length === 0) {
    scroll.innerHTML = '<div class="empty">Complete tasks to see wins.</div>';
    return;
  }

  let html = '<div class="section-label">Recent</div><div class="win-list">';
  for (const t of wins) {
    const d = new Date(t.date + 'T00:00:00');
    let label;
    if (t.date === dk(today)) label = 'Today';
    else if (t.date === dk(addD(today, -1))) label = 'Yesterday';
    else label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    html += `
      <div class="win-row">
        <div class="title">${escapeHtml(t.title)}</div>
        <div class="date">${label}${t.time ? ' · ' + t.time : ''}</div>
      </div>`;
  }
  html += '</div>';

  // Quick streak summary derived from data
  const doneToday = state.tasks.filter(t => t.date === dk(today) && t.done).length;
  const totalToday = state.tasks.filter(t => t.date === dk(today)).length;
  html = `
    <div class="section-label">Today</div>
    <div class="win-list">
      <div class="win-row"><div class="title">Completed today</div><div class="date">${doneToday}/${totalToday}</div></div>
      <div class="win-row"><div class="title">Current streak</div><div class="date">3 days</div></div>
    </div>
  ` + html;

  scroll.innerHTML = html;
}

/* ════════════════════════════════════════════════════════════════
   "+ New" handler — prompt for title for simplicity
   ═══════════════════════════════════════════════════════════════ */
document.querySelectorAll('[data-action="new"]').forEach(btn => {
  btn.addEventListener('click', () => {
    const title = prompt('New task');
    if (title && title.trim()) {
      addTask(title.trim(), dk(today), null);
      renderWins();
    }
  });
});

/* ════════════════════════════════════════════════════════════════
   INITIAL RENDER
   ═══════════════════════════════════════════════════════════════ */
renderTasks();
renderCal();
renderAsst();
renderWins();
renderSettings();
</script>
